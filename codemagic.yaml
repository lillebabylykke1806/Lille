workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    integrations:
      app_store_connect: Codemagic Admin
    environment:
      groups:
        - ios
      ios_signing:
        distribution_type: app_store
        bundle_identifier: no.lilleapp.app
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Next.js
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-xcargs "CURRENT_PROJECT_VERSION=11 MARKETING_VERSION=1.0.4"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-workflow:
    name: Android Workflow
    max_build_duration: 60
    environment:
      groups:
        - android
      vars:
        PACKAGE_NAME: "no.lilleapp.app"
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Create empty out directory
        script: mkdir -p out
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Set up keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/android/keystore.jks
          cat >> "$CM_BUILD_DIR/android/local.properties" <<EOF
          storeFile=$CM_BUILD_DIR/android/keystore.jks
          storePassword=$CM_KEYSTORE_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          keyPassword=$CM_KEY_PASSWORD
          EOF
      - name: Build Android release
        script: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$CM_BUILD_DIR/android/keystore.jks \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal