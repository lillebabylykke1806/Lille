workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    integrations:
      app_store_connect: Codemagic Admin
    environment:
      groups:
        - ios
      ios_signing:
        distribution_type: app_store
        bundle_identifier: no.lilleapp.app
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Next.js
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-xcargs "CURRENT_PROJECT_VERSION=12 MARKETING_VERSION=1.0.4"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
