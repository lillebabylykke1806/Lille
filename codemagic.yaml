workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    integrations:
      app_store_connect: Codemagic Admin
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: no.lilleapp.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        CERTIFICATE_NAME: "Lille Distribution"
        PROVISIONING_PROFILE_NAME: "Lille App Store 2"
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Next.js
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
